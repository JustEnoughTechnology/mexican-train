  <text x="420" y="750" class="description-text">⚠️ GameConfig: Tested via other components</text>
  <text x="420" y="765" class="description-text">⚠️ Player: Basic testing, part of integration tests</text>
  <text x="420" y="780" class="description-text">⚠️ Admin: Dashboard tested, authentication covered</text>
  <text x="420" y="795" class="description-text">⚠️ Utilities: Most tested indirectly</text>
  
