  <text x="1070" y="405" class="description-text" style="font-weight: bold; fill: #28a745;">✅ Excellent Coverage:</text>
  <text x="1070" y="420" class="description-text">• Every core component has dedicated tests</text>
  <text x="1070" y="435" class="description-text">• Multiple test variations per component</text>
  <text x="1070" y="450" class="description-text">• Integration tests cover component interactions</text>
  <text x="1070" y="465" class="description-text">• Server testing includes all scenarios</text>
  
  <text x="1070" y="490" class="description-text" style="font-weight: bold; fill: #ffa726;">⚠️ Areas for Improvement:</text>
