  <text x="770" y="440" class="description-text">• Game logic scripts & scenes</text>
  <text x="770" y="455" class="description-text">• Autoload singletons (7)</text>
  <text x="770" y="470" class="description-text">• Admin & server systems</text>
  
  <text x="770" y="490" class="description-text" style="font-weight: bold;">Test System: 87+ files</text>
