  <text x="70" y="750" class="description-text">✅ Hand: Multiple drag-drop tests + integration</text>
  <text x="70" y="765" class="description-text">✅ Station: 4+ test variations + layout tests</text>
  <text x="70" y="780" class="description-text">✅ Train: Multiple orientation + drag-drop tests</text>
  <text x="70" y="795" class="description-text">✅ Server: 5+ server testing scenarios</text>
  
  <rect x="400" y="680" width="300" height="120" fill="#fff3e0" stroke="#f57c00" stroke-width="2" rx="5"/>
  <text x="550" y="700" class="section-title" style="text-anchor: middle; fill: #f57c00;">Medium Coverage Components</text>
  
